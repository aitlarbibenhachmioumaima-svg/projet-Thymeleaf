<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter / Modifier Employé - Parc Informatique</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Parc Informatique</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/materiels}">Matériel</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/employes}">Employés</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/affectations}">Affectations</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/stats}">Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<h2 th:text="${employe.id != null} ? 'Modifier Employé' : 'Ajouter Employé'"></h2>

<form th:action="@{/employe/save}" th:object="${employe}" method="post" class="w-50">

    <!-- Champ ID caché pour update -->
    <input type="hidden" th:field="*{id}" />

    <div class="mb-3">
        <label class="form-label">Nom</label>
        <input type="text" th:field="*{nom}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Service</label>
        <input type="text" th:field="*{service}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control">
    </div>
    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a th:href="@{/employes}" class="btn btn-secondary">Annuler</a>
</form>

<footer class="bg-dark text-white text-center py-3 mt-4">
    &copy; 2026 Parc Informatique
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
