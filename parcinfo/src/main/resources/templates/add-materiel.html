<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter / Modifier Matériel - Parc Informatique</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Parc Informatique</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/materiels}">Matériel</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/employes}">Employés</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/affectations}">Affectations</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/stats}">Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<h2 th:text="${materiel.id != null} ? 'Modifier Matériel' : 'Ajouter Matériel'"></h2>

<form th:action="@{/materiel/save}" th:object="${materiel}" method="post" class="w-50">

    <!-- ID caché pour update -->
    <input type="hidden" th:field="*{id}" />

    <div class="mb-3">
        <label class="form-label">Référence</label>
        <input type="text" th:field="*{ref}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Type</label>
        <input type="text" th:field="*{type}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Marque</label>
        <input type="text" th:field="*{marque}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">État</label>
        <input type="text" th:field="*{etat}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Date d'achat</label>
        <input type="date" th:field="*{dateAchat}" class="form-control">
    </div>
    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a th:href="@{/materiels}" class="btn btn-secondary">Annuler</a>
</form>

<footer class="bg-dark text-white text-center py-3 mt-4">
    &copy; 2026 Parc Informatique
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
