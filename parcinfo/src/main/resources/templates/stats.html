<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Statistiques - Parc Informatique</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Parc Informatique</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/materiels}">Matériel</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/employes}">Employés</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/affectations}">Affectations</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/stats}">Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<h2>Statistiques du Parc Informatique</h2>

<div class="mb-4">
    <h4>Taux d'utilisation du matériel</h4>
    <div class="progress" style="height: 30px;">
        <div class="progress-bar" role="progressbar" th:style="'width:' + ${tauxUtilisation} + '%'"
             th:text="${#numbers.formatDecimal(tauxUtilisation, 1, 2)} + '%'">
        </div>
    </div>
</div>

<div>
    <h4>Nombre de matériels par état</h4>
    <table class="table table-striped w-50">
        <thead>
        <tr>
            <th>État</th>
            <th>Nombre</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="etatStat : ${panneParEtat}">
            <td th:text="${etatStat[0]}"></td>
            <td th:text="${etatStat[1]}"></td>
        </tr>
        </tbody>
    </table>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
    &copy; 2026 Parc Informatique
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
