<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter / Modifier Affectation - Parc Informatique</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Parc Informatique</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/materiels}">Matériel</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/employes}">Employés</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/affectations}">Affectations</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/stats}">Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<h2 th:text="${affectation.id != null} ? 'Modifier Affectation' : 'Ajouter Affectation'"></h2>

<form th:action="@{/affectation/save}" th:object="${affectation}" method="post" class="w-50">
    <div class="mb-3">
        <label class="form-label">Matériel</label>
        <select th:field="*{materiel}" class="form-select" required>
            <option th:each="m : ${materiels}" th:value="${m.id}" th:text="${m.ref}"></option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Employé</label>
        <select th:field="*{employe}" class="form-select" required>
            <option th:each="e : ${employes}" th:value="${e.id}" th:text="${e.nom}"></option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Date début</label>
        <input type="date" th:field="*{dateDebut}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Date fin</label>
        <input type="date" th:field="*{dateFin}" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Statut</label>
        <select th:field="*{statut}" class="form-select" required>
            <option value="active">Active</option>
            <option value="retournée">Retournée</option>
        </select>
    </div>
    <button type="submit" class="btn btn-success">Enregistrer</button>
    <a th:href="@{/affectations}" class="btn btn-secondary">Annuler</a>
</form>

<footer class="bg-dark text-white text-center py-3 mt-4">
    &copy; 2026 Parc Informatique
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
