<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste Affectations - Parc Informatique</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Parc Informatique</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/materiels}">Matériel</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/employes}">Employés</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/affectations}">Affectations</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/stats}">Statistiques</a></li>
            </ul>
        </div>
    </div>
</nav>

<h2>Liste des Affectations</h2>

<!-- Filtrage par service ou statut -->
<form class="row g-3 mb-3" method="get" th:action="@{/affectations}">
    <div class="col-auto">
        <input type="text" name="service" th:value="${param.service}" placeholder="Service" class="form-control">
    </div>
    <div class="col-auto">
        <input type="text" name="statut" th:value="${param.statut}" placeholder="Statut (active/retournée)" class="form-control">
    </div>
    <div class="col-auto">
        <button type="submit" class="btn btn-primary">Filtrer</button>
        <a th:href="@{/affectations}" class="btn btn-secondary">Réinitialiser</a>
    </div>
</form>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Matériel</th>
        <th>Employé</th>
        <th>Service</th>
        <th>Date Début</th>
        <th>Date Fin</th>
        <th>Statut</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${affectations}">
        <td th:text="${a.materiel.ref}"></td>
        <td th:text="${a.employe.nom}"></td>
        <td th:text="${a.employe.service}"></td>
        <td th:text="${a.dateDebut}"></td>
        <td th:text="${a.dateFin}"></td>
        <td th:text="${a.statut}"></td>
        <td>
            <a th:href="@{/affectation/edit/{id}(id=${a.id})}" class="btn btn-sm btn-warning">Modifier</a>
            <a th:href="@{/affectation/delete/{id}(id=${a.id})}" class="btn btn-sm btn-danger"
               onclick="return confirm('Supprimer cette affectation ?')">Supprimer</a>
        </td>
    </tr>
    </tbody>
</table>

<a th:href="@{/affectation/add}" class="btn btn-success">Ajouter Affectation</a>

<footer class="bg-dark text-white text-center py-3 mt-4">
    &copy; 2026 Parc Informatique
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
